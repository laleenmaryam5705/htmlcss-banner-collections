<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <!-- poppins font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <title>Website</title>
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <div class="nav-left">
                <ul>
                    <img src="assets/Logo (1).png" alt="logo">
                    <li>Home</li>
                    <li>About</li>
                    <li>Services</li>
                    <li>Portfolio</li>
                    <li>Pricing</li>
                </ul>
            </div>
            <div class="nav-right">
                <button class="small">Contact Us</button>
            </div>
        </nav>
        <div class="banner">
            <div class="leftside">
                <h1 class="hero-heading">
                    We Help You <br> <span>Crush</span> Your <br> Competition
                </h1>
                <p class="hero-line">
                    Build trust to connect your brand to billions of users and grow your revenue <br>through SEO.
                </p>
                <button class="large">See our services</button>
            </div>
            <div class="rightside">
                <img src="assets/Header Illustration.png" alt="illustration">
            </div>
        </div>
    </div>

</html>
